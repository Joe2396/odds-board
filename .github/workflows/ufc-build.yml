name: UFC Build

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4 playwright && playwright install chromium --with-deps

      - name: Fetch upcoming UFC events
        run: python scripts/fetch_upcoming_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch UFCStats fighter stats
        run: python scripts/fetch_ufcstats_fighter_stats.py || echo "UFCStats failed, continuing"

      - name: Build fighter recent fights
        run: python scripts/build_fighter_recent_fights.py || echo "Failed, continuing"

      - name: Fetch BetVictor fight URLs
        run: python scripts/fetch_betvictor_fight_urls.py || echo "Failed, continuing"

      - name: Fetch Coral fight URLs
        run: python scripts/fetch_coral_fight_urls.py || echo "Failed, continuing"

      - name: Fetch PaddyPower fight URLs
        run: python scripts/fetch_paddypower_fight_urls.py || echo "Failed, continuing"

      - name: Fetch 888Sport props
        run: python scripts/fetch_888sport_props.py || echo "Failed, continuing"

      - name: Fetch Betfred props
        run: python scripts/fetch_betfred_props.py || echo "Failed, continuing"

      - name: Fetch BetVictor props
        run: python scripts/fetch_betvictor_props.py || echo "Failed, continuing"

      - name: Fetch BoyleSports props
        run: python scripts/fetch_boylesports_props.py || echo "Failed, continuing"

      - name: Fetch BoyleSports moneylines
        run: python scripts/fetch_boylesports_moneylines.py || echo "Failed, continuing"

      - name: Fetch Bwin props
        run: python scripts/fetch_bwin_props.py || echo "Failed, continuing"

      - name: Fetch Coral props
        run: python scripts/fetch_coral_props.py || echo "Failed, continuing"

      - name: Fetch LiveScoreBet UFC moneylines
        run: python scripts/fetch_livescorebet_ufc_moneylines.py || echo "Failed, continuing"

      - name: Fetch Tote props
        run: python scripts/fetch_tote_props.py || echo "Failed, continuing"

      - name: Fetch PaddyPower props
        run: python scripts/fetch_ufc_props_paddypower.py || echo "Failed, continuing"

      - name: Fetch Unibet props
        run: python scripts/fetch_unibet_props.py || echo "Failed, continuing"

      - name: Fetch WilliamHill props
        run: python scripts/fetch_williamhill_props.py || echo "Failed, continuing"

      - name: Filter BetVictor props
        run: python scripts/filter_betvictor_props.py

      - name: Filter BoyleSports props
        run: python scripts/filter_boylesports_props.py

      - name: Filter Coral props
        run: python scripts/filter_coral_props.py

      - name: Filter props
        run: python scripts/filter_props.py

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC tracker
        run: python scripts/generate_ufc_tracker.py

      - name: Generate EV Alerts
        run: python scripts/generate_ev_alerts.py

      - name: Build unified EV alerts
        run: python scripts/build_ev_alerts_all.py

      - name: Build unified arbitrage
        run: python scripts/build_arbitrage_all.py

      - name: Commit generated output
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add ufc data ev-alerts arbitrage index.html 2>/dev/null || true
          git commit -m "Auto-generate UFC odds, EV alerts and arbitrage" || echo "No changes to commit"
          git push
