name: UFC Build

on:
  workflow_dispatch:

  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "ufc/**"
      - ".github/workflows/ufc-build.yml"

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      # -----------------------------
      # 1) EVENT + FIGHT CARD DATA
      # -----------------------------
      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      # -----------------------------
      # 2) TAPOLOGY (NEW SYSTEM)
      # -----------------------------
      - name: Fetch Tapology fighter stats
        run: python scripts/fetch_tapology_fighter_stats.py

      # -----------------------------
      # 3) GENERATE SITE
      # -----------------------------
      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      # -----------------------------
      # DEBUG (optional but useful)
      # -----------------------------
      - name: Debug fighter count
        run: |
          python - <<'PY'
          import json, os

          path = "ufc/data/fighters.json"
          if not os.path.exists(path):
              print("fighters.json missing")
              raise SystemExit(1)

          data = json.load(open(path, encoding="utf-8"))
          fighters = data.get("fighters", [])

          print("fighters count:", len(fighters))

          print("\nSample fighters:")
          for f in fighters[:10]:
              print("-", f.get("name"), "| record:", f.get("record"))
          PY

      # -----------------------------
      # COMMIT OUTPUT
      # -----------------------------
      - name: Commit generated output
        run: |
          git config user.name "ufc-bot"
          git config user.email "actions@github.com"

          git add -A ufc

          git commit -m "Auto-generate UFC pages" || echo "No changes to commit"

          git push origin main --force
