name: UFC Build

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "ufc/**"
      - "data/**"
      - "docs/**"
      - "index.html"
      - ".github/workflows/ufc-build.yml"

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      # --- Events / fighters base data ---

      - name: Fetch upcoming UFC events
        run: python scripts/fetch_upcoming_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch UFCStats fighter stats
        run: python scripts/fetch_ufcstats_fighter_stats.py || echo "UFCStats failed, continuing with existing fighter data"

      - name: Build fighter recent fights
        run: python scripts/build_fighter_recent_fights.py || echo "build_fighter_recent_fights failed, continuing"

      # --- Fight URL discovery (must run before matching prop fetchers) ---

      - name: Fetch BetVictor fight URLs
        run: python scripts/fetch_betvictor_fight_urls.py || echo "BetVictor URL fetch failed, continuing"

      - name: Fetch Coral fight URLs
        run: python scripts/fetch_coral_fight_urls.py || echo "Coral URL fetch failed, continuing"

      - name: Fetch PaddyPower fight URLs
        run: python scripts/fetch_paddypower_fight_urls.py || echo "PaddyPower URL fetch failed, continuing"

      # --- Bookmaker props / moneylines ---
      # NOTE: BoyleSports props must run before BoyleSports moneylines —
      # moneylines reads the fight URLs file that props discovers and writes.

      - name: Fetch 888Sport props
        run: python scripts/fetch_888sport_props.py || echo "888Sport failed, continuing"

      - name: Fetch Betfred props
        run: python scripts/fetch_betfred_props.py || echo "Betfred failed, continuing"

      - name: Fetch BetVictor props
        run: python scripts/fetch_betvictor_props.py || echo "BetVictor props failed, continuing"

      - name: Fetch BoyleSports props
        run: python scripts/fetch_boylesports_props.py || echo "BoyleSports props failed, continuing (Cloudflare may block CI IPs)"

      - name: Fetch BoyleSports moneylines
        run: python scripts/fetch_boylesports_moneylines.py || echo "BoyleSports moneylines failed, continuing"

      - name: Fetch Bwin props
        run: python scripts/fetch_bwin_props.py || echo "Bwin failed, continuing"

      - name: Fetch Coral props
        run: python scripts/fetch_coral_props.py || echo "Coral props failed, continuing"

      - name: Fetch LiveScoreBet UFC moneylines
        run: python scripts/fetch_livescorebet_ufc_moneylines.py || echo "LiveScoreBet failed, continuing"

      - name: Fetch Tote props
        run: python scripts/fetch_tote_props.py || echo "Tote failed, continuing"

      - name: Fetch PaddyPower props
        run: python scripts/fetch_ufc_props_paddypower.py || echo "PaddyPower props failed, continuing"

      - name: Fetch Unibet props
        run: python scripts/fetch_unibet_props.py || echo "Unibet failed, continuing"

      - name: Fetch WilliamHill props
        run: python scripts/fetch_williamhill_props.py || echo "WilliamHill failed, continuing"

      # --- Filtering ---

      - name: Filter BetVictor props
        run: python scripts/filter_betvictor_props.py

      - name: Filter BoyleSports props
        run: python scripts/filter_boylesports_props.py

      - name: Filter Coral props
        run: python scripts/filter_coral_props.py

      - name: Filter props
        run: python scripts/filter_props.py

      # --- Page generation ---

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC tracker
        run: python scripts/generate_ufc_tracker.py

      - name: Generate EV Alerts
        run: python scripts/generate_ev_alerts.py

      - name: Build unified EV alerts
        run: python scripts/build_ev_alerts_all.py

      - name: Build unified arbitrage
        run: python scripts/build_arbitrage_all.py

      - name: Debug UFC data counts
        run: |
          python - <<'PY'
          import json, os
          files = [
              "ufc/data/events.json",
              "ufc/data/fighters.json",
              "data/arbitrage_all.json",
              "data/ev_alerts_all.json",
              "ufc/data/props_filtered.json",
              "ufc/data/boylesports_props_filtered.json",
              "ufc/data/betvictor_props_filtered.json",
              "ufc/data/coral_props_filtered.json",
              "ufc/data/livescorebet_moneylines.json",
              "ufc/data/boylesports_moneylines.json",
          ]
          for path in files:
              if not os.path.exists(path):
                  print(f"{path}: MISSING")
                  continue
              try:
                  data = json.load(open(path, encoding="utf-8"))
                  print(f"{path}: keys={list(data.keys()) if isinstance(data, dict) else type(data).__name__}")
                  if isinstance(data, dict):
                      for key in ["events", "fighters", "fights", "props", "opportunities"]:
                          if key in data:
                              print(f"  {key}={len(data.get(key) or [])}")
              except Exception as e:
                  print(f"{path}: ERROR {e}")
          PY

      - name: Commit generated output
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true

          git add ufc data docs odds scripts index.html 2>/dev/null || true
          git add .github/workflows/ufc-build.yml

          git commit -m "Auto-generate UFC odds, EV alerts and arbitrage" || echo "No changes to commit"

          git push