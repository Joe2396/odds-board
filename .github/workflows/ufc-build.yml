name: UFC Build

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */3 * * *"

  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "ufc/**"
      - ".github/workflows/ufc-build.yml"

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      # -----------------------------
      # 1) EVENT + FIGHT CARD DATA
      # -----------------------------

      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      - name: Fetch UFCStats fighter stats
        run: python scripts/fetch_ufcstats_fighter_stats.py

      # -----------------------------
      # 2) ODDS + ARBITRAGE DATA
      # -----------------------------

      - name: Fetch UFC odds UK bookies
        run: python scripts/fetch_ufc_odds.py

      - name: Analyze UFC arbitrage
        run: python scripts/analyze_ufc_arbitrage.py

      - name: Build unified arbitrage
        run: python scripts/build_arbitrage_all.py

      # -----------------------------
      # 3) PADDYPOWER UFC PROPS
      # IMPORTANT:
      # PaddyPower scraping works locally but returns 0 fights on GitHub.
      # So we scrape PaddyPower locally, commit the JSON files, and GitHub uses them.
      # -----------------------------

      - name: Filter PaddyPower props
        run: python scripts/filter_props.py

      # -----------------------------
      # 4) GENERATE UFC SITE PAGES
      # -----------------------------

      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      # -----------------------------
      # 5) DEBUG COUNTS
      # -----------------------------

      - name: Debug UFC data counts
        run: |
          python - <<'PY'
          import json, os

          files = [
              "ufc/data/events.json",
              "ufc/data/fighters.json",
              "ufc/data/odds.json",
              "ufc/data/arbitrage.json",
              "ufc/data/props.json",
              "ufc/data/props_filtered.json",
              "ufc/data/paddypower_fight_urls.json",
          ]

          for path in files:
              if not os.path.exists(path):
                  print(f"{path}: MISSING")
                  continue

              try:
                  data = json.load(open(path, encoding="utf-8"))
                  if isinstance(data, dict):
                      print(f"{path}: keys={list(data.keys())}")
                      if "events" in data:
                          print(f"  events={len(data.get('events') or [])}")
                      if "fighters" in data:
                          print(f"  fighters={len(data.get('fighters') or [])}")
                      if "fights" in data:
                          print(f"  fights={len(data.get('fights') or [])}")
                  else:
                      print(f"{path}: {type(data).__name__} length={len(data)}")
              except Exception as e:
                  print(f"{path}: ERROR {e}")
          PY

      # -----------------------------
      # 6) COMMIT GENERATED OUTPUT
      # -----------------------------

      - name: Commit generated output
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          git add ufc data docs odds scripts index.html 2>/dev/null || true
          git add .github/workflows/ufc-build.yml

          git commit -m "Auto-generate UFC pages, odds, props and arbitrage" || echo "No changes to commit"
          git push