name: UFC Build

on:
  workflow_dispatch:

  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "ufc/**"
      - ".github/workflows/ufc-build.yml"

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4

      # -----------------------------
      # 1) EVENT + FIGHT CARD DATA
      # -----------------------------
      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      # -----------------------------
      # 2) UFCSTATS FIGHTER DATA
      # -----------------------------
      - name: Fetch UFCStats fighter stats
        run: python scripts/fetch_ufcstats_fighter_stats.py

      # -----------------------------
      # 3) ODDS DATA (NEW 🔥)
      # -----------------------------
      - name: Fetch UFC odds (UK bookies)
        run: python scripts/fetch_ufc_odds.py

      # -----------------------------
      # 4) GENERATE SITE
      # -----------------------------
      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      # -----------------------------
      # DEBUG (VERY USEFUL NOW)
      # -----------------------------
      - name: Debug fighter + odds count
        run: |
          python - <<'PY'
          import json, os

          # Fighters
          f_path = "ufc/data/fighters.json"
          if os.path.exists(f_path):
              data = json.load(open(f_path, encoding="utf-8"))
              fighters = data.get("fighters", [])
              print("fighters count:", len(fighters))
          else:
              print("fighters.json missing")

          # Odds
          o_path = "ufc/data/odds.json"
          if os.path.exists(o_path):
              data = json.load(open(o_path, encoding="utf-8"))
              events = data.get("events", [])
              print("odds events count:", len(events))

              print("\nSample odds:")
              for e in events[:3]:
                  print("-", e.get("home_team"), "vs", e.get("away_team"))
          else:
              print("odds.json missing")
          PY

      # -----------------------------
      # COMMIT OUTPUT
      # -----------------------------
      - name: Commit generated output
        run: |
          git config user.name "ufc-bot"
          git config user.email "actions@github.com"

          git add -A ufc

          git commit -m "Auto-generate UFC pages + odds" || echo "No changes to commit"

          git push origin main --force
