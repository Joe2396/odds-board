name: UFC Build

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

  push:
    branches: [ main ]
    paths:
      - "scripts/**"
      - "ufc/**"
      - "data/**"
      - ".github/workflows/ufc-build.yml"

permissions:
  contents: write

concurrency:
  group: ufc-build-main
  cancel-in-progress: true

jobs:
  build-ufc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests beautifulsoup4

      - name: Fetch recent past UFC events
        run: python scripts/fetch_recent_past_events.py

      - name: Fetch ESPN event fight cards
        run: python scripts/fetch_espn_event_fightcards.py

      - name: Fetch UFCStats fighter stats
        run: python scripts/fetch_ufcstats_fighter_stats.py

      - name: Fetch UFC odds UK bookies
        run: python scripts/fetch_ufc_odds.py

      - name: Analyze UFC arbitrage
        run: python scripts/analyze_ufc_arbitrage.py

      - name: Build unified arbitrage
        run: python scripts/build_arbitrage_all.py

      - name: Generate UFC hub
        run: python scripts/generate_ufc_hub.py

      - name: Generate UFC events
        run: python scripts/generate_ufc_events.py

      - name: Generate UFC fights
        run: python scripts/generate_ufc_fights.py

      - name: Generate UFC fighters
        run: python scripts/generate_ufc_fighters.py

      - name: Debug UFC data counts
        run: |
          python - <<'PY'
          import json, os

          checks = [
              ("fighters", "ufc/data/fighters.json"),
              ("odds", "ufc/data/odds.json"),
              ("props", "ufc/data/props.json"),
              ("arbitrage", "ufc/data/arbitrage.json"),
              ("arbitrage_all", "data/arbitrage_all.json"),
          ]

          for label, path in checks:
              print(f"\n--- {label.upper()} ---")
              if not os.path.exists(path):
                  print(f"{path} missing")
                  continue

              data = json.load(open(path, encoding="utf-8"))

              if label == "fighters":
                  print("fighters count:", len(data.get("fighters", [])))
              elif label == "odds":
                  print("odds events count:", len(data.get("events", [])))
              elif label == "props":
                  print("props fight:", data.get("fight"))
                  print("props markets:", list((data.get("markets") or {}).keys()))
              elif label == "arbitrage":
                  print("fights checked:", data.get("total_fights_checked"))
                  print("arbitrage count:", data.get("arbitrage_count"))
              elif label == "arbitrage_all":
                  print("total arbitrage:", data.get("total_arbitrage"))
          PY

      - name: Commit generated output
        run: |
          git config user.name "ufc-bot"
          git config user.email "actions@github.com"

          git add -A ufc data

          git commit -m "Auto-generate UFC pages, odds and arbitrage" || echo "No changes to commit"

          git push origin main
