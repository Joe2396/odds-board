name: Football World Cup Build

on:
  workflow_dispatch:
  # schedule disabled because scraping is done locally
  # schedule:
  #   - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  build-football:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build football pages and tools only
        run: |
          python scripts/Football/generate_worldcup_page.py
          python scripts/Football/analyze_football_arbitrage.py
          python scripts/Football/build_football_ev_alerts.py
          python scripts/build_ev_alerts_all.py
          python scripts/build_arbitrage_all.py

      - name: Commit generated football pages only
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add football/world-cup football/index.html data ev-alerts arbitrage
          git commit -m "Build football pages EV alerts and arbitrage" || echo "No changes to commit"
          git push origin main