name: Football World Cup Build

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  build-football:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Run football scrapers
        run: |
          xvfb-run -a python scripts/Football/fetch_paddypower_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_boylesports_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_betvictor_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_unibet_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_livescorebet_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_williamhill_worldcup_moneylines.py || true
          xvfb-run -a python scripts/Football/fetch_888sport_worldcup_moneylines.py || true

      - name: Build football pages and tools
        run: |
          python scripts/Football/generate_worldcup_page.py
          python scripts/Football/analyze_football_arbitrage.py
          python scripts/Football/build_football_ev_alerts.py
          python scripts/build_ev_alerts_all.py
          python scripts/build_arbitrage_all.py

      - name: Commit updated football data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add football data ev-alerts arbitrage scripts/Football scripts/build_ev_alerts_all.py scripts/build_arbitrage_all.py
          git commit -m "Auto update football odds and betting tools" || echo "No changes to commit"
          git push