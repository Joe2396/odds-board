<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Football — BeatTheBooks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1621;
      color: white;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .page { max-width: 1200px; margin: 0 auto; padding: 42px 24px; }
    .hero {
      border: 1px solid #223047;
      border-radius: 28px;
      padding: 34px;
      background: rgba(17,24,39,0.85);
      margin-bottom: 24px;
    }
    .eyebrow {
      display: inline-block;
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.45);
      background: rgba(34,197,94,0.1);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 { font-size: clamp(42px, 6vw, 78px); letter-spacing: -0.055em; margin-bottom: 12px; }
    p { color: #91a0b5; line-height: 1.6; }
    .card {
      display: block;
      border: 1px solid #223047;
      border-radius: 22px;
      padding: 24px;
      background: rgba(255,255,255,0.035);
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(96,165,250,0.55); }
    .card h2 { font-size: 28px; margin-bottom: 8px; }
    .meta { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      border: 1px solid #223047;
      border-radius: 999px;
      padding: 7px 10px;
      color: #bfdbfe;
      font-size: 13px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">⚽ Football</div>
      <h1>Football Hub</h1>
      <p>Football odds, fixtures and betting tools. Starting with FIFA World Cup moneylines.</p>
    </section>

    <a class="card" href="/odds-board/football/world-cup/">
      <h2>FIFA World Cup</h2>
      <p>Best available match odds across tracked bookmakers.</p>
      <div class="meta">
        <span class="pill">72 fixtures</span>
        <span class="pill">2 bookmakers</span>
        <span class="pill">Best H/D/A odds</span>
        <span class="pill">Updated 2026-06-01T14:14:23.642974+00:00</span>
      </div>
    </a>
  </main>
</body>
</html>
